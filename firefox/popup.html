<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --md-primary: #2f6a3c;
    --md-on-primary: #ffffff;
    --md-primary-container: #b3f2bd;
    --md-on-primary-container: #002106;
    --md-error: #ba1a1a;
    --md-error-container: #ffdad6;
    --md-on-error-container: #410002;
    --md-surface: #fbfcf8;
    --md-surface-container-low: #f3f5ee;
    --md-surface-container: #ecefe6;
    --md-surface-container-high: #e6e9e1;
    --md-on-surface: #1a1c19;
    --md-on-surface-variant: #43483f;
    --md-outline: #73796d;
    --md-outline-variant: #c3c8ba;
    --md-radius-lg: 20px;
    --md-radius-md: 14px;
    --md-radius-full: 999px;
  }

  * {
    box-sizing: border-box;
    -webkit-user-select: none;
    -moz-user-select: none;
    user-select: none;
  }

  body {
    width: 280px;
    font-family: "Google Sans", Roboto, -apple-system, "Segoe UI", Arial, sans-serif;
    background: var(--md-surface);
    color: var(--md-on-surface);
    margin: 0;
    padding: 12px;
  }

  .app-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .app-icon {
    width: 32px;
    height: 32px;
    border-radius: var(--md-radius-md);
    background: var(--md-error-container);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .app-icon svg {
    width: 18px;
    height: 18px;
    fill: var(--md-on-error-container);
  }

  h1 {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.3;
    margin: 0;
    letter-spacing: 0.1px;
  }

  #result {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .stat-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--md-surface-container);
    border: 1px solid var(--md-outline-variant);
    border-radius: var(--md-radius-lg);
    padding: 10px 14px;
  }

  .stat-icon {
    width: 36px;
    height: 36px;
    border-radius: var(--md-radius-full);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: var(--md-primary-container);
  }

  .stat-row.dislike .stat-icon {
    background: var(--md-error-container);
  }

  .stat-icon svg {
    width: 18px;
    height: 18px;
    fill: var(--md-on-primary-container);
  }

  .stat-row.dislike .stat-icon svg {
    fill: var(--md-on-error-container);
  }

  .stat-text {
    display: flex;
    flex-direction: column;
    line-height: 1.25;
  }

  .stat-label {
    font-size: 12px;
    color: var(--md-on-surface-variant);
  }

  .stat-value {
    font-size: 16px;
    font-weight: 600;
  }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid var(--md-outline-variant);
    border-top-color: var(--md-on-error-container);
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .mode-switch {
    position: relative;
    display: flex;
    gap: 6px;
    margin-top: 10px;
    background: var(--md-surface-container-low);
    border-radius: var(--md-radius-full);
    padding: 4px;
  }

  .mode-switch-indicator {
    position: absolute;
    top: 4px;
    bottom: 4px;
    left: 4px;
    width: 0;
    background: var(--md-primary-container);
    border-radius: var(--md-radius-full);
    transition: left 0.28s cubic-bezier(0.2, 0, 0, 1), width 0.28s cubic-bezier(0.2, 0, 0, 1);
    z-index: 0;
  }

  .mode-option {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 12px 10px;
    border-radius: var(--md-radius-full);
    font-size: 13px;
    font-weight: 500;
    color: var(--md-on-surface-variant);
    transition: color 0.2s ease;
    cursor: pointer;
  }

  .mode-option svg {
    width: 18px;
    height: 18px;
    fill: var(--md-on-surface-variant);
    transition: fill 0.2s ease;
  }

  .mode-option.active {
    color: var(--md-on-primary-container);
  }

  .mode-option.active svg {
    fill: var(--md-on-primary-container);
  }

  .mode-option.disabled {
    cursor: not-allowed;
    opacity: 0.4;
    pointer-events: none;
  }

  .advanced-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: var(--md-radius-md);
    font-size: 13px;
    font-weight: 500;
    color: var(--md-on-surface-variant);
  }

  .advanced-toggle svg {
    width: 18px;
    height: 18px;
    fill: var(--md-on-surface-variant);
    transition: transform 0.15s ease;
  }

  .advanced-toggle.open svg {
    transform: rotate(180deg);
  }

  .advanced-panel {
    display: none;
    margin-top: 4px;
    background: var(--md-surface-container);
    border: 1px solid var(--md-outline-variant);
    border-radius: var(--md-radius-lg);
    padding: 4px;
  }

  .advanced-panel.open {
    display: block;
  }

  .advanced-option {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--md-radius-md);
    font-size: 13px;
  }

  .switch {
    position: relative;
    width: 36px;
    height: 20px;
    border-radius: var(--md-radius-full);
    background: var(--md-outline-variant);
    flex-shrink: 0;
  }

  .switch::after {
    content: "";
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--md-surface);
    transition: transform 0.15s ease;
  }

  .switch.on {
    background: var(--md-primary-container);
  }

  .github-link {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--md-surface-container);
    border: 1px solid var(--md-outline-variant);
    border-radius: var(--md-radius-lg);
    font-size: 13px;
    font-weight: 500;
    color: var(--md-on-surface-variant);
    text-decoration: none;
  }

  .github-link img {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  .switch.on::after {
    background: var(--md-on-primary-container);
    transform: translateX(16px);
  }
</style>
</head>
<body>
  <div class="app-bar">
    <div class="app-icon">

    </div>
    <h1>Return Shorts Dislike</h1>
  </div>

  <div id="result">
    <div class="stat-row">
      <div class="stat-icon">
        <svg viewBox="0 0 24 24"><path d="M16.25 2.5c3.823 0 6.75 3.232 6.75 7 0 4.436-2.806 7.696-5.224 9.699-2.46 2.038-4.906 3.104-4.98 3.135l-.796.347-.797-.347c-.073-.031-2.52-1.097-4.98-3.135C3.807 17.196 1 13.936 1 9.5c0-3.768 2.927-7 6.75-7 1.629 0 3.1.596 4.25 1.565A6.559 6.559 0 0 1 16.25 2.5zm0 2c-1.861 0-3.47 1.128-4.25 2.768C11.22 5.628 9.611 4.5 7.75 4.5 5.127 4.5 3 6.74 3 9.5c0 7.09 9 11 9 11s9-3.91 9-11c0-2.76-2.127-5-4.75-5z"/></svg>

      </div>
    </div>

    <div class="stat-row dislike">
      <div class="stat-icon">
        <svg viewBox="0 -960 960 960"><path d="M600-400v-80h320v80H600ZM440-120 313-234q-72-65-123.5-116t-85-96q-33.5-45-49-87T40-621q0-94 63-156.5T260-840q52 0 99 21.5t81 61.5q34-40 81-61.5t99-21.5q85 0 142.5 51.5T834-668q-18-7-36-10.5t-35-3.5q-101 0-172 70.5T520-440q0 52 21 98.5t59 79.5q-19 17-49.5 43.5T498-172l-58 52Z"/></svg>
      </div>
      <div class="stat-text">
        <span class="stat-label">Dislike</span>

    </div>

    <div class="mode-switch">
      <div class="mode-switch-indicator" id="modeIndicator"></div>
      <div class="mode-option active" data-mode="dislike">

    <div class="advanced-toggle" id="advancedToggle">
      Advanced
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960"><path d="M480-345 240-585l56-56 184 184 184-184 56 56-240 240Z"/></svg>
    </div>
    <div class="advanced-panel" id="advancedPanel">
      <div class="advanced-option" id="cookieSpeedupOption">
        <span>Speed up using cookies (experimental)</span>
        <div class="switch" id="cookieSpeedupSwitch"></div>
      </div>
    </div>

    <a class="github-link" href="https://github.com/MuySup/ReturnShortsDislike" target="_blank" rel="noopener noreferrer">
      <img src="github-icon.svg" alt="">

  </div>

  <script src="popup.js"></script>
</body>
</html>
